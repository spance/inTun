name: Build and Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Determine version
        id: version
        run: |
          echo "ver=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        env:
          VERSION: ${{ steps.version.outputs.ver }}
        run: |
          LDFLAGS="-s -w -X main.Version=${VERSION}"
          mkdir -p dist

          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build $LDFLAGS -o dist/intun-darwin-amd64       ./cmd/intun
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build $LDFLAGS -o dist/intun-darwin-arm64       ./cmd/intun
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build $LDFLAGS -o dist/intun-linux-amd64        ./cmd/intun
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build $LDFLAGS -o dist/intun-linux-arm64        ./cmd/intun
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build $LDFLAGS -o dist/intun-windows-amd64.exe  ./cmd/intun

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums-sha256.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "inTun ${{ steps.version.outputs.ver }}"
          files: dist/*
