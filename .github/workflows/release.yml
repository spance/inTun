name: Build and Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Determine version
        id: version
        run: |
          echo "ver=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        env:
          VERSION: ${{ steps.version.outputs.ver }}
        run: |
          mkdir -p dist
          build() {
            CGO_ENABLED=0 GOOS=$1 GOARCH=$2 go build -ldflags "-s -w -X main.Version=${VERSION}" -o dist/$3 ./cmd/intun
          }
          build darwin  amd64 intun-darwin-amd64
          build darwin  arm64 intun-darwin-arm64
          build linux   amd64 intun-linux-amd64
          build linux   arm64 intun-linux-arm64
          build windows amd64 intun-windows-amd64.exe

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums-sha256.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "inTun ${{ steps.version.outputs.ver }}"
          files: dist/*
